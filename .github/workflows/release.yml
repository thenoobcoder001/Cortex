name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish artifacts to (e.g. v0.0.6)"
        required: true
        default: "v0.0.6"
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-2022, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: desktop_app/package-lock.json

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-dev fakeroot


      - name: Install dependencies
        working-directory: desktop_app
        run: npm ci

      - name: Build Web UI
        working-directory: desktop_app
        run: npm run build:web

      - name: Build and Publish Electron App
        working-directory: desktop_app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_PRE_RELEASE: "false"
          EP_DRAFT: "false"
          EP_GH_IGNORE_TIME: "true"
        run: npx electron-builder --publish always --config.publish.releaseType=release
